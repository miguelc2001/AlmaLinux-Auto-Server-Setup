# ============================================================
# Configuracao por defeito do projeto AS
# ============================================================
# Edita este ficheiro para refletir o teu ambiente.
# E carregado por todos os scripts atraves de lib/common.sh.

# IP do servidor (onde correm os servicos BIND/Apache/Samba/NFS)
SERVER_IP="192.168.1.100"

# Hostname curto do servidor
SERVER_NAME="ns1"

# Email do administrador (usado no SOA das zonas DNS; @ vira .)
ADMIN_EMAIL="admin.example.com"

# Diretoria base do projeto (usada para logs, backups, etc.)
PROJECT_ROOT="/opt/as-projeto"

# Diretoria para backups dos ficheiros de configuracao do sistema
# (snapshots automaticos antes de editar)
CONFIG_BACKUP_DIR="/var/backups/as-projeto"

# Diretoria para backups do ponto 9 (tar + rsync incremental)
BACKUP_DIR="/backup"

# Ficheiro de log de auditoria
LOG_FILE="/var/log/as-projeto.log"

# Paths dos servicos (AlmaLinux 8 / RHEL8)
NAMED_CONF="/etc/named.conf"
NAMED_ZONES_DIR="/var/named"
NAMED_CUSTOM_INCLUDE="/etc/named/as-zones.conf"
NAMED_BLACKLIST_INCLUDE="/etc/named/as-blacklist.conf"
NAMED_BLACKLIST_DIR="/var/named/blacklist"

HTTPD_CONF_D="/etc/httpd/conf.d"
HTTPD_DOCROOT_BASE="/var/www"

SAMBA_CONF="/etc/samba/smb.conf"
NFS_EXPORTS="/etc/exports"

FAIL2BAN_JAIL_LOCAL="/etc/fail2ban/jail.local"
KNOCKD_CONF="/etc/knockd.conf"

# IP para onde responder dominios em blacklist (por default, loopback)
BLACKLIST_REDIRECT_IP="127.0.0.1"

# Sequencia de port-knocking (abrir / fechar SSH)
KNOCK_OPEN_SEQ="7000,8000,9000"
KNOCK_CLOSE_SEQ="9000,8000,7000"
